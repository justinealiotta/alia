name: Alia Supabase Keepalive

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -X POST "${{ secrets.ALIA_SUPABASE_URL }}/rest/v1/keepalive" \
            -H "apikey: ${{ secrets.ALIA_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.ALIA_SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d '{"id": 1, "pinged_at": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'
